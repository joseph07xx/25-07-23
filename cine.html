  <style>
    /* ===== RESET Y LAYOUT ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Fondo negro absoluto, ocupa toda la pantalla, sin scroll */
    html,
    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
      /* Bloquear selección de texto e imágenes */
      user-select: none;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
    }

    /* Contenedor principal: centra la imagen con flex */
    #cine-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    /* Imagen: se adapta sin deformarse, transición suave para el efecto cine */
    #cine-image {
      max-width: 100vw;
      max-height: 100vh;
      width: auto;
      height: auto;
      object-fit: contain;
      opacity: 1;
      transition: opacity 1.2s ease-in-out;
      /* Bloquea la selección de la imagen en navegadores */
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    /* Clase auxiliar para fade-out (se aplica antes de cambiar la imagen) */
    #cine-image.fade-out {
      opacity: 0;
    }

    /* El audio está oculto pero presente */
    #cine-audio {
      display: none;
    }
  </style>

{ id: "1uPJNqlBHWM1bPp2RfxNdQOpUHnhaWi1V" },
{ id: "1vg9FJepBIttjQVFJIPhzh2N7EeWO79Jy" }
      ];

      // Función que construye la URL a partir de un ID.
      // Usamos picsum.photos para tener imágenes variadas y reales.
      // Si prefieres imágenes locales, cambia esta función.
const buildImageUrl = (item) => `https://lh3.googleusercontent.com/d/${item.id}`;
      // Tiempo en milisegundos entre cada cambio de imagen
      const INTERVAL_MS = 5000; // 5 segundos

      // ============================================================
      // 2. ELEMENTOS DOM
      // ============================================================

      const imgElement = document.getElementById('cine-image');
      const audioElement = document.getElementById('cine-audio');

      // ============================================================
      // 3. ESTADO
      // ============================================================

      let currentIndex = 0; // Índice de la imagen actual
      let imageUrls = []; // Array de URLs completas
      let isTransitioning = false; // Evita cambios múltiples durante la transición
      let intervalId = null; // ID del intervalo para detenerlo si es necesario

      // ============================================================
      // 4. PRECARGA DE IMÁGENES (evita parpadeos en blanco)
      // ============================================================

      /**
       * Precarga un array de URLs de imágenes.
       * Devuelve una promesa que se resuelve cuando todas las imágenes
       * han sido cargadas exitosamente.
       */
      function preloadImages(urls) {
        const promises = urls.map((url) => {
          return new Promise((resolve, reject) => {
            const img = new Image();
            img.onload = () => resolve(url);
            img.onerror = () => reject(new Error(`Error al cargar la imagen: ${url}`));
            img.src = url;
          });
        });
        return Promise.all(promises);
      }

      // ============================================================
      // 5. CAMBIO DE IMAGEN CON EFECTO CINE (fade in / fade out)
      // ============================================================

      /**
       * Cambia la imagen actual por la siguiente del array.
       * Aplica un fade-out, actualiza el src y luego un fade-in.
       * Usa el evento 'transitionend' para sincronizar los pasos.
       */
      function cambiarImagen() {
        // Si ya hay una transición en curso o no hay URLs, salimos
        if (isTransitioning || imageUrls.length === 0) return;

        // Marcar inicio de transición
        isTransitioning = true;

        // 1. Aplicar fade-out a la imagen actual
        imgElement.classList.add('fade-out');

        // 2. Escuchar el fin de la transición de opacidad
        const onTransitionEnd = function(e) {
          // Asegurarnos de que es la transición de opacidad
          if (e.propertyName !== 'opacity') return;

          // Remover el listener para evitar acumulación
          imgElement.removeEventListener('transitionend', onTransitionEnd);

          // 3. Calcular siguiente índice (cíclico)
          currentIndex = (currentIndex + 1) % imageUrls.length;

          // 4. Cambiar la fuente de la imagen (nueva imagen)
          imgElement.src = imageUrls[currentIndex];

          // 5. Quitar la clase fade-out para que entre con fade-in
          imgElement.classList.remove('fade-out');

          // 6. Marcar fin de transición
          isTransitioning = false;
        };

        imgElement.addEventListener('transitionend', onTransitionEnd);
      }

      // ============================================================
      // 6. INICIALIZACIÓN
      // ============================================================

      /**
       * Inicia la aplicación: precarga las imágenes, establece la primera,
       * y arranca el intervalo de cambio automático.
       */
      function init() {
        // Construir array de URLs a partir de los IDs
        imageUrls = IMAGE_IDS.map(id => buildImageUrl(id));

        // Precargar todas las imágenes
        preloadImages(imageUrls)
          .then((loadedUrls) => {
            console.log(`✅ ${loadedUrls.length} imágenes precargadas correctamente.`);

            // Establecer la primera imagen (índice 0)
            imgElement.src = imageUrls[0];
            // Asegurar que la opacidad esté en 1 (por si acaso)
            imgElement.classList.remove('fade-out');
            imgElement.style.opacity = '1';

            // Iniciar el ciclo de cambios cada INTERVAL_MS
            intervalId = setInterval(cambiarImagen, INTERVAL_MS);
          })
          .catch((error) => {
            console.error('❌ Error en la precarga de imágenes:', error);
            // Mostrar un mensaje o imagen de fallback si se desea
          });
      }

      // ============================================================
      // 7. AUDIO: REPRODUCCIÓN AUTOMÁTICA DESBLOQUEADA POR CLIC
      // ============================================================

      /**
       * Detecta el primer clic del usuario en cualquier parte de la pantalla
       * y reproduce el audio, respetando la política de autoplay de los navegadores.
       * Una vez reproducido, se elimina el listener.
       */
      function setupAudioAutoplay() {
        const playAudio = function() {
          audioElement.play()
            .then(() => {
              console.log('🎵 Audio reproducido correctamente.');
              // Eliminar el listener después del primer clic exitoso
              document.removeEventListener('click', playAudio);
            })
            .catch((err) => {
              // Si falla, mantenemos el listener para otro intento
              console.warn('⚠️ No se pudo reproducir el audio en este clic:', err);
            });
        };

        // Escuchamos el primer clic en el documento
        document.addEventListener('click', playAudio);
      }

      // ============================================================
      // 8. BLOQUEOS DE SEGURIDAD Y USABILIDAD
      // ============================================================

      // Bloquear clic derecho (menú contextual)
      document.addEventListener('contextmenu', (e) => e.preventDefault());

      // ============================================================
      // 9. ARRANQUE
      // ============================================================

      // Iniciar la aplicación cuando el DOM esté listo
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', () => {
          init();
          setupAudioAutoplay();
        });
      } else {
        init();
        setupAudioAutoplay();
      }

    })();
