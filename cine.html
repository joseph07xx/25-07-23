      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,

      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
      user-select: none;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
    }

    #cine-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    #cine-image {
      max-width: 100vw;
      max-height: 100vh;
      width: auto;
      height: auto;
      object-fit: contain;
      opacity: 1;
      transition: opacity 1.2s ease-in-out;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    #cine-image.fade-out {
      opacity: 0;
    }

    #cine-audio {
      display: none;
    }
  </style>

        { id: "1towosIbi-GSdBp87a195-jmXeGQgbrx3" },
        { id: "1u5KrA4Xg6erBkkA1A73rg5AHe928Wjbt" },
        { id: "1uPJNqlBHWM1bPp2RfxNdQOpUHnhaWi1V" }
      ];

      // URL válida para Google Drive
      const buildImageUrl = (item) =>
        `https://drive.google.com/uc?export=view&id=${item.id}`;

      const INTERVAL_MS = 5000; // 5 segundos

      // ============================================================
      // 2. ELEMENTOS DOM
      // ============================================================

      const imgElement = document.getElementById('cine-image');
      const audioElement = document.getElementById('cine-audio');

      // ============================================================
      // 3. ESTADO
      // ============================================================

      let currentIndex = 0;
      let imageUrls = [];
      let isTransitioning = false;
      let intervalId = null;

      // ============================================================
      // 4. PRECARGA DE IMÁGENES
      // ============================================================

      function preloadImages(urls) {
        const promises = urls.map((url) => {
          return new Promise((resolve, reject) => {
            const img = new Image();
            img.onload = () => resolve(url);
            img.onerror = () => reject(new Error(`Error al cargar: ${url}`));
            img.src = url;
          });
        });
        return Promise.all(promises);
      }

      // ============================================================
      // 5. CAMBIO DE IMAGEN CON FADE Y CARGA CONTROLADA
      // ============================================================

      function cambiarImagen() {
        if (isTransitioning || imageUrls.length === 0) return;

        isTransitioning = true;

        // 1. Fade-out
        imgElement.classList.add('fade-out');

        const onFadeOutEnd = function(e) {
          if (e.propertyName !== 'opacity') return;
          imgElement.removeEventListener('transitionend', onFadeOutEnd);

          // 2. Calcular siguiente índice
          currentIndex = (currentIndex + 1) % imageUrls.length;
          const nextUrl = imageUrls[currentIndex];

          // 3. Asignar nueva URL y esperar a que cargue
          imgElement.src = nextUrl;

          // 4. Cuando la imagen esté cargada, hacemos fade-in
          const onImageLoad = function() {
            imgElement.removeEventListener('load', onImageLoad);
            imgElement.removeEventListener('error', onImageError);
            imgElement.classList.remove('fade-out');
            isTransitioning = false;
          };

          const onImageError = function() {
            // Si falla, saltamos a la siguiente (evita que se quede atascado)
            imgElement.removeEventListener('load', onImageLoad);
            imgElement.removeEventListener('error', onImageError);
            console.warn('⚠️ Falló la imagen, saltando a la siguiente.');
            // Forzamos la transición a terminar
            imgElement.classList.remove('fade-out');
            isTransitioning = false;
            // Llamamos de nuevo a cambiarImagen (pero con un pequeño retraso para evitar bucles)
            setTimeout(cambiarImagen, 100);
          };

          imgElement.addEventListener('load', onImageLoad);
          imgElement.addEventListener('error', onImageError);
        };

        imgElement.addEventListener('transitionend', onFadeOutEnd);
      }

      // ============================================================
      // 6. INICIALIZACIÓN
      // ============================================================

      function init() {
        imageUrls = IMAGE_IDS.map(item => buildImageUrl(item));

        if (imageUrls.length === 0) return;

        // Precargar todas las imágenes antes de empezar
        preloadImages(imageUrls)
          .then(() => {
            console.log('✅ Todas las imágenes precargadas.');
            // Mostrar la primera
            imgElement.src = imageUrls[0];
            imgElement.classList.remove('fade-out');
            imgElement.style.opacity = '1';

            // Arrancar el intervalo
            intervalId = setInterval(cambiarImagen, INTERVAL_MS);
            console.log('🎬 Cine iniciado con ' + imageUrls.length + ' imágenes.');
          })
          .catch((err) => {
            console.error('❌ Error en la precarga:', err);
            // Aún así intentamos mostrar la primera
            imgElement.src = imageUrls[0];
            intervalId = setInterval(cambiarImagen, INTERVAL_MS);
          });
      }

      // ============================================================
      // 7. AUDIO: REPRODUCCIÓN AL PRIMER CLIC
      // ============================================================

      function setupAudioAutoplay() {
        const playAudio = function() {
          audioElement.play()
            .then(() => {
              console.log('🎵 Audio reproducido.');
              document.removeEventListener('click', playAudio);
            })
            .catch((err) => console.warn('⚠️ Audio no reproducido:', err));
        };
        document.addEventListener('click', playAudio);
      }

      // ============================================================
      // 8. BLOQUEOS
      // ============================================================

      document.addEventListener('contextmenu', (e) => e.preventDefault());

      // ============================================================
      // 9. ARRANQUE
      // ============================================================

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', () => {
          init();
          setupAudioAutoplay();
        });
      } else {
        init();
        setupAudioAutoplay();
      }
