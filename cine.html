    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;

    html,
    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
      user-select: none;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
    }

    #cine-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    #cine-image {
      max-width: 100vw;
      max-height: 100vh;
      width: auto;
      height: auto;
      object-fit: contain;
      opacity: 1;
      transition: opacity 1.2s ease-in-out;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    #cine-image.fade-out {
      opacity: 0;
    }

    #cine-audio {
      display: none;
    }
  </style>
</head>

      ];

      // URL para Google Drive (formato que funciona en móviles y desktop)
      const buildImageUrl = (id) => 
        `https://drive.google.com/uc?export=view&id=${id}`;

      const INTERVAL_MS = 5000;

      // ============================================================
      // 2. ELEMENTOS DOM
      // ============================================================

      const imgElement = document.getElementById('cine-image');
      const audioElement = document.getElementById('cine-audio');

      // ============================================================
      // 3. ESTADO
      // ============================================================

      let currentIndex = 0;
      let imageUrls = [];
      let isTransitioning = false;
      let intervalId = null;

      // ============================================================
      // 4. PRECARGA DE IMÁGENES
      // ============================================================

      function preloadImages(urls) {
        return new Promise((resolve, reject) => {
          let loaded = 0;
          const total = urls.length;
          
          if (total === 0) {
            resolve([]);
            return;
          }

          urls.forEach((url, index) => {
            const img = new Image();
            img.onload = () => {
              loaded++;
              if (loaded === total) {
                resolve(urls);
              }
            };
            img.onerror = () => {
              console.warn(`⚠️ Error cargando imagen ${index + 1}/${total}`);
              loaded++;
              if (loaded === total) {
                resolve(urls); // Resolvemos aunque algunas fallen
              }
            };
            img.src = url;
          });
        });
      }

      // ============================================================
      // 5. CAMBIO DE IMAGEN CON FADE
      // ============================================================

      function cambiarImagen() {
        if (isTransitioning || imageUrls.length === 0) return;

        isTransitioning = true;

        // Fade-out
        imgElement.classList.add('fade-out');

        // Esperar a que termine el fade-out
        const handleTransitionEnd = function(e) {
          if (e.propertyName !== 'opacity') return;
          imgElement.removeEventListener('transitionend', handleTransitionEnd);

          // Calcular siguiente índice
          currentIndex = (currentIndex + 1) % imageUrls.length;

          // Cambiar la imagen
          imgElement.src = imageUrls[currentIndex];

          // Esperar a que cargue la nueva imagen
          imgElement.onload = function() {
            imgElement.onload = null;
            imgElement.onerror = null;
            // Quitar fade-out (fade-in)
            imgElement.classList.remove('fade-out');
            isTransitioning = false;
          };

          imgElement.onerror = function() {
            imgElement.onload = null;
            imgElement.onerror = null;
            console.warn('⚠️ Error cargando imagen, continuando...');
            imgElement.classList.remove('fade-out');
            isTransitioning = false;
          };
        };

        imgElement.addEventListener('transitionend', handleTransitionEnd);
      }

      // ============================================================
      // 6. INICIALIZACIÓN
      // ============================================================

      function init() {
        imageUrls = IMAGE_IDS.map(id => buildImageUrl(id));

        if (imageUrls.length === 0) {
          console.error('❌ No hay imágenes para mostrar');
          return;
        }

        // Precargar todas las imágenes
        preloadImages(imageUrls)
          .then(() => {
            console.log('✅ Imágenes precargadas correctamente');
            
            // Mostrar primera imagen
            imgElement.src = imageUrls[0];
            imgElement.classList.remove('fade-out');
            imgElement.style.opacity = '1';

            // Iniciar ciclo
            intervalId = setInterval(cambiarImagen, INTERVAL_MS);
            console.log(`🎬 Cine iniciado con ${imageUrls.length} imágenes`);
          })
          .catch((err) => {
            console.error('❌ Error en precarga:', err);
            // Intentar mostrar la primera imagen igualmente
            imgElement.src = imageUrls[0];
            intervalId = setInterval(cambiarImagen, INTERVAL_MS);
          });
      }

      // ============================================================
      // 7. AUDIO: REPRODUCCIÓN AL PRIMER CLIC
      // ============================================================

      function setupAudioAutoplay() {
        const playAudio = function() {
          audioElement.play()
            .then(() => {
              console.log('🎵 Audio reproducido correctamente');
              document.removeEventListener('click', playAudio);
              document.removeEventListener('touchstart', playAudio);
            })
            .catch((err) => {
              console.warn('⚠️ No se pudo reproducir el audio:', err);
            });
        };

        // Escuchar tanto clic como touch (para móviles)
        document.addEventListener('click', playAudio);
        document.addEventListener('touchstart', playAudio);
      }

      // ============================================================
      // 8. BLOQUEOS DE SEGURIDAD
      // ============================================================

      document.addEventListener('contextmenu', (e) => e.preventDefault());

      // ============================================================
      // 9. ARRANQUE
      // ============================================================

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', () => {
          init();
          setupAudioAutoplay();
        });
      } else {
        init();
        setupAudioAutoplay();
      }

    })();
