<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cine · Proyector</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html { width: 100vw; height: 100vh; overflow: hidden; background: #000; }

    #cine-container {
      width: 100vw; height: 100vh;
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }

    .frame {
      position: absolute;
      width: 100vw; height: 100vh;
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      transition: opacity 1.5s ease-in-out;
      pointer-events: none;
    }

    .frame.active { opacity: 1; z-index: 1; }

    .drive-image {
      max-width: 90vw; max-height: 80vh;
      object-fit: contain;
      box-shadow: 0 0 50px rgba(0,0,0,0.5);
    }

    .info-overlay {
      position: absolute; bottom: 50px; color: white; text-align: center;
      font-family: sans-serif; text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
      z-index: 2;
    }

    #cine-audio { display: none; }
  </style>
</head>
<body>

  <div id="cine-container">
    <!-- 🔹 QUITÉ el atributo 'loop' para que el audio se reproduzca solo una vez -->
    <audio id="cine-audio" preload="auto">
      <source src="https://ia601904.us.archive.org/26/items/coldplay-yellow-official-video-y-knxe-f-4-kms-y/Coldplay%20-%20Yellow%20%28Official%20Video%29%20%5ByKNxeF4KMsY%5D.mp3" />
      Tu navegador no soporta la reproducción de audio.
    </audio>
  </div>

  <script src="js/cine_script.js"></script>
</body>
</html>
