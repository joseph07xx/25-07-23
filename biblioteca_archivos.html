<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>📚 Biblioteca de Archivos</title>

    <!-- Google Fonts (Inter) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />

    <!-- Font Awesome 6 (gratuito) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <style>
        /* ========== VARIABLES ========== */
        :root {
            --bg: #f4f6fc;
            --bg-card: #ffffff;
            --text-primary: #0b1a33;
            --text-secondary: #2c3e5a;
            --text-muted: #5e6f8d;
            --shadow: 0 12px 30px rgba(0, 20, 50, 0.08);
            --shadow-hover: 0 20px 40px rgba(0, 20, 50, 0.18);
            --radius: 20px;
            --radius-sm: 12px;
            --transition: 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            --accent: #4f6ef7;
            --accent-hover: #3a56d4;
            --accent-light: #eef2ff;
            --border-light: #e9edf5;
            --header-bg: rgba(255, 255, 255, 0.7);
            --glass: rgba(255, 255, 255, 0.6);
            --tag-bg: #eef2ff;
            --tag-text: #4f6ef7;
            --lightbox-bg: rgba(10, 20, 40, 0.75);
        }

        [data-theme="dark"] {
            --bg: #0e1a2b;
            --bg-card: #1a2a41;
            --text-primary: #f0f4ff;
            --text-secondary: #c8d6f0;
            --text-muted: #8fa0c0;
            --shadow: 0 12px 30px rgba(0, 0, 0, 0.4);
            --shadow-hover: 0 20px 40px rgba(0, 0, 0, 0.6);
            --accent: #6b8aff;
            --accent-hover: #5270e0;
            --accent-light: #1f3150;
            --border-light: #2a3f5c;
            --header-bg: rgba(14, 26, 43, 0.8);
            --glass: rgba(20, 40, 65, 0.7);
            --tag-bg: #1f3150;
            --tag-text: #8fb0ff;
            --lightbox-bg: rgba(0, 0, 0, 0.8);
        }

        /* ========== RESET & BASE ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 0 24px 40px;
            transition: background var(--transition), color var(--transition);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ========== SCROLLBAR ========== */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 10px;
        }

        /* ========== HEADER ========== */
        .app-header {
            width: 100%;
            max-width: 1280px;
            padding: 20px 0 16px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 16px 24px;
            backdrop-filter: blur(12px);
            background: var(--header-bg);
            border-radius: var(--radius);
            padding: 16px 28px;
            margin-bottom: 32px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-light);
            transition: all var(--transition);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-area i {
            font-size: 28px;
            color: var(--accent);
        }
        .logo-area h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .logo-area span {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-muted);
            background: var(--tag-bg);
            padding: 2px 12px;
            border-radius: 40px;
            -webkit-text-fill-color: var(--text-muted);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: 60px;
            padding: 6px 16px 6px 20px;
            transition: all var(--transition);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.02);
        }
        .search-box:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-light);
        }
        .search-box i {
            color: var(--text-muted);
            font-size: 15px;
        }
        .search-box input {
            border: none;
            background: transparent;
            padding: 10px 10px 10px 12px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
            width: 180px;
            outline: none;
        }
        .search-box input::placeholder {
            color: var(--text-muted);
            font-weight: 400;
        }

        .btn-icon {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: 60px;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all var(--transition);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.02);
        }
        .btn-icon:hover {
            background: var(--accent-light);
            color: var(--accent);
            border-color: var(--accent);
            transform: scale(1.04);
        }

        /* ========== STATS BAR ========== */
        .stats-bar {
            width: 100%;
            max-width: 1280px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 12px 20px;
            margin-bottom: 28px;
            padding: 0 8px;
        }
        .stats-left {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            background: var(--bg-card);
            padding: 6px 16px 6px 14px;
            border-radius: 40px;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow);
            transition: all var(--transition);
        }
        .stat-item i {
            color: var(--accent);
            font-size: 16px;
        }
        .stat-item strong {
            color: var(--text-primary);
            font-weight: 700;
        }

        .view-controls {
            display: flex;
            gap: 6px;
            background: var(--bg-card);
            padding: 4px;
            border-radius: 40px;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow);
        }
        .view-btn {
            background: transparent;
            border: none;
            padding: 8px 14px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-muted);
            cursor: pointer;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .view-btn i {
            font-size: 15px;
        }
        .view-btn.active {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 4px 10px rgba(79, 110, 247, 0.3);
        }
        .view-btn:not(.active):hover {
            background: var(--accent-light);
            color: var(--accent);
        }

        /* ========== FILTER TAGS ========== */
        .filter-bar {
            width: 100%;
            max-width: 1280px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px 12px;
            margin-bottom: 30px;
            padding: 0 4px;
        }
        .filter-tag {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: 40px;
            padding: 8px 18px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all var(--transition);
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .filter-tag i {
            font-size: 14px;
        }
        .filter-tag:hover {
            border-color: var(--accent);
            color: var(--accent);
            transform: translateY(-2px);
        }
        .filter-tag.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
            box-shadow: 0 6px 14px rgba(79, 110, 247, 0.25);
        }
        .filter-tag.active i {
            color: #fff;
        }

        /* ========== GRID / LIST ========== */
        .grid-container {
            width: 100%;
            max-width: 1280px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            transition: all var(--transition);
        }
        .grid-container.list-view {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .grid-container.list-view .card {
            display: flex;
            align-items: center;
            padding: 16px 24px;
            gap: 20px;
            flex-wrap: wrap;
        }
        .grid-container.list-view .card .card-icon {
            width: 52px;
            height: 52px;
            font-size: 24px;
        }
        .grid-container.list-view .card .card-body {
            flex: 1;
            min-width: 160px;
        }
        .grid-container.list-view .card .card-actions {
            margin-top: 0;
        }

        /* ========== CARD ========== */
        .card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 22px 22px 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-light);
            transition: all var(--transition);
            display: flex;
            flex-direction: column;
            position: relative;
            backdrop-filter: blur(2px);
            animation: fadeUp 0.5s ease both;
        }
        .card:nth-child(1) {
            animation-delay: 0.03s;
        }
        .card:nth-child(2) {
            animation-delay: 0.07s;
        }
        .card:nth-child(3) {
            animation-delay: 0.11s;
        }
        .card:nth-child(4) {
            animation-delay: 0.15s;
        }
        .card:nth-child(5) {
            animation-delay: 0.19s;
        }
        .card:nth-child(6) {
            animation-delay: 0.23s;
        }

        @keyframes fadeUp {
            0% {
                opacity: 0;
                transform: translateY(20px) scale(0.97);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-hover);
            border-color: var(--accent);
        }

        .card-icon {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 14px;
            background: var(--accent-light);
            color: var(--accent);
            transition: all var(--transition);
        }
        .card:hover .card-icon {
            transform: scale(1.05) rotate(-2deg);
        }

        .card .card-body {
            flex: 1;
        }
        .card .card-body h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-primary);
            letter-spacing: -0.2px;
        }
        .card .card-body p {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 10px;
        }
        .card-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 12px 18px;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 12px;
        }
        .card-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .card-meta i {
            font-size: 13px;
        }
        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 14px;
        }
        .card-tags .tag {
            background: var(--tag-bg);
            color: var(--tag-text);
            font-size: 11px;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 40px;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        .card-actions {
            display: flex;
            gap: 10px;
            margin-top: 4px;
            flex-wrap: wrap;
        }
        .card-actions .btn-primary {
            background: var(--accent);
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 14px;
            color: #fff;
            cursor: pointer;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Inter', sans-serif;
            box-shadow: 0 4px 12px rgba(79, 110, 247, 0.25);
        }
        .card-actions .btn-primary:hover {
            background: var(--accent-hover);
            transform: scale(1.03);
            box-shadow: 0 6px 18px rgba(79, 110, 247, 0.35);
        }
        .card-actions .btn-secondary {
            background: transparent;
            border: 1px solid var(--border-light);
            padding: 10px 16px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 14px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Inter', sans-serif;
        }
        .card-actions .btn-secondary:hover {
            background: var(--accent-light);
            border-color: var(--accent);
            color: var(--accent);
        }

        /* ========== LIGHTBOX ========== */
        #lightbox {
            position: fixed;
            inset: 0;
            background: var(--lightbox-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.35s ease;
        }
        #lightbox.open {
            opacity: 1;
        }
        #lightbox .contenedor {
            width: 92%;
            max-width: 1200px;
            height: 88vh;
            background: var(--bg-card);
            border-radius: var(--radius);
            overflow: hidden;
            position: relative;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.5);
            transform: scale(0.94);
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 1px solid var(--border-light);
        }
        #lightbox.open .contenedor {
            transform: scale(1);
        }
        #lightbox iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        #cerrar {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: #fff;
            font-size: 22px;
            border: none;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        #cerrar:hover {
            background: #ef4444;
            transform: rotate(90deg);
        }
        #cerrar i {
            font-size: 22px;
        }

        /* ========== FOOTER ========== */
        .app-footer {
            width: 100%;
            max-width: 1280px;
            margin-top: 48px;
            padding: 24px 0 12px;
            border-top: 1px solid var(--border-light);
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            color: var(--text-muted);
            font-size: 14px;
        }
        .app-footer a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }
        .app-footer a:hover {
            text-decoration: underline;
        }
        .app-footer .socials {
            display: flex;
            gap: 16px;
        }
        .app-footer .socials a {
            color: var(--text-muted);
            font-size: 18px;
            transition: color var(--transition);
        }
        .app-footer .socials a:hover {
            color: var(--accent);
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 720px) {
            .app-header {
                flex-direction: column;
                align-items: stretch;
                gap: 12px;
                padding: 16px 18px;
            }
            .header-actions {
                flex-wrap: wrap;
                justify-content: stretch;
            }
            .search-box input {
                width: 100%;
            }
            .search-box {
                flex: 1;
            }
            .stats-bar {
                flex-direction: column;
                align-items: stretch;
            }
            .stats-left {
                justify-content: center;
            }
            .view-controls {
                align-self: center;
            }
            .filter-bar {
                justify-content: center;
            }
            .grid-container {
                grid-template-columns: 1fr;
            }
            .grid-container.list-view .card {
                flex-direction: column;
                align-items: stretch;
                text-align: center;
            }
            .grid-container.list-view .card .card-icon {
                align-self: center;
            }
            .card-actions {
                justify-content: center;
            }
            #lightbox .contenedor {
                width: 98%;
                height: 92vh;
            }
            #cerrar {
                top: 10px;
                right: 10px;
                width: 42px;
                height: 42px;
                font-size: 18px;
            }
            .logo-area span {
                display: none;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 0 12px 30px;
            }
            .app-header {
                padding: 12px 14px;
            }
            .stat-item {
                font-size: 12px;
                padding: 4px 12px;
            }
            .filter-tag {
                font-size: 12px;
                padding: 6px 14px;
            }
        }

        /* ========== UTILITY ========== */
        .hidden {
            display: none !important;
        }
        .fade-in {
            animation: fadeUp 0.5s ease both;
        }
    </style>
</head>
<body>

    <!-- ===== HEADER ===== -->
    <header class="app-header">
        <div class="logo-area">
            <i class="fas fa-folder-open"></i>
            <h1>Archivoteca</h1>
            <span>v2.0</span>
        </div>
        <div class="header-actions">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Buscar archivos..." />
            </div>
            <button class="btn-icon" id="themeToggle" title="Cambiar tema">
                <i class="fas fa-moon"></i>
            </button>
        </div>
    </header>

    <!-- ===== STATS ===== -->
    <div class="stats-bar">
        <div class="stats-left">
            <div class="stat-item"><i class="fas fa-file"></i> Total: <strong id="totalCount">0</strong></div>
            <div class="stat-item"><i class="fas fa-file-pdf"></i> PDF: <strong id="pdfCount">0</strong></div>
            <div class="stat-item"><i class="fas fa-file-powerpoint"></i> Presentaciones: <strong id="pptCount">0</strong></div>
            <div class="stat-item"><i class="fas fa-file-word"></i> Docs: <strong id="docCount">0</strong></div>
        </div>
        <div class="view-controls">
            <button class="view-btn active" data-view="grid" id="gridViewBtn"><i class="fas fa-th"></i> Grilla</button>
            <button class="view-btn" data-view="list" id="listViewBtn"><i class="fas fa-list"></i> Lista</button>
        </div>
    </div>

    <!-- ===== FILTERS ===== -->
    <div class="filter-bar" id="filterBar">
        <button class="filter-tag active" data-filter="all"><i class="fas fa-layer-group"></i> Todos</button>
        <button class="filter-tag" data-filter="pdf"><i class="fas fa-file-pdf"></i> PDF</button>
        <button class="filter-tag" data-filter="presentacion"><i class="fas fa-file-powerpoint"></i> Presentación</button>
        <button class="filter-tag" data-filter="documento"><i class="fas fa-file-word"></i> Documento</button>
        <button class="filter-tag" data-filter="hoja"><i class="fas fa-file-excel"></i> Hoja</button>
    </div>

    <!-- ===== GRID ===== -->
    <div class="grid-container" id="gridContainer"></div>

    <!-- ===== LIGHTBOX ===== -->
    <div id="lightbox">
        <div class="contenedor">
            <button id="cerrar"><i class="fas fa-times"></i></button>
            <iframe id="visor" allowfullscreen></iframe>
        </div>
    </div>

    <!-- ===== FOOTER ===== -->
    <footer class="app-footer">
        <span>© 2026 Archivoteca · <a href="#">hecho con <i class="fas fa-heart" style="color:#ef4444;"></i></a></span>
        <div class="socials">
            <a href="#"><i class="fab fa-github"></i></a>
            <a href="#"><i class="fab fa-whatsapp"></i></a>
            <a href="#"><i class="fab fa-youtube"></i></a>
        </div>
    </footer>

    <script src="js/biblioteca_archivos_script.js"></script>

</body>
</html>
