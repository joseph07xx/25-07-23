<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cine · Proyector de Recuerdos</title>
  <style>
    :root {
      --transition-slow: 1.8s;
      --transition-med: .6s;
      --accent: #e8c07d;
      --ink: #f4f1ea;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body, html {
      width: 100vw; height: 100vh;
      overflow: hidden;
      background: #000;
      font-family: 'Georgia', 'Times New Roman', serif;
    }

    /* ---------- PANTALLA DE BIENVENIDA ---------- */
    #welcome-screen {
      position: fixed; inset: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at center, #1a1410 0%, #000 75%);
      color: var(--ink);
      text-align: center;
      padding: 24px;
      transition: opacity 1.2s ease, visibility 1.2s ease;
    }

    #welcome-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    #welcome-screen h1 {
      font-size: clamp(1.6rem, 5vw, 2.6rem);
      font-weight: 400;
      letter-spacing: 0.04em;
      margin-bottom: 12px;
      opacity: 0;
      animation: fadeInUp 1.4s ease forwards .3s;
    }

    #welcome-screen p.subtitle {
      font-size: clamp(.85rem, 2.4vw, 1.05rem);
      color: rgba(244,241,234,0.65);
      margin-bottom: 40px;
      font-style: italic;
      opacity: 0;
      animation: fadeInUp 1.4s ease forwards .7s;
    }

    #start-button {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: inherit;
      font-size: 1rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 14px 38px;
      cursor: pointer;
      border-radius: 2px;
      transition: background .35s ease, color .35s ease, box-shadow .35s ease;
      opacity: 0;
      animation: fadeInUp 1.4s ease forwards 1.1s;
    }

    #start-button:hover,
    #start-button:focus-visible {
      background: var(--accent);
      color: #1a1410;
      box-shadow: 0 0 24px rgba(232,192,125,0.45);
    }

    #welcome-loader {
      margin-top: 26px;
      font-size: .8rem;
      color: rgba(244,241,234,0.5);
      letter-spacing: 0.08em;
      min-height: 1.2em;
      opacity: 0;
      animation: fadeInUp 1.4s ease forwards 1.4s;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ---------- CONTENEDOR PRINCIPAL ---------- */
    #cine-container {
      width: 100vw; height: 100vh;
      display: flex; align-items: center; justify-content: center;
      position: relative;
      background: #000;
    }

    .frame {
      position: absolute;
      inset: 0;
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      transition: opacity var(--transition-slow) ease-in-out;
      pointer-events: none;
      overflow: hidden;
    }

    .frame.active { opacity: 1; z-index: 1; }

    .frame-inner {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
    }

    .drive-image {
      max-width: 92vw; max-height: 82vh;
      object-fit: contain;
      box-shadow: 0 0 60px rgba(0,0,0,0.65);
      will-change: transform;
    }

    /* Efecto Ken Burns: alterna dirección para variar el movimiento */
    .frame.active .drive-image.kb-in  { animation: kenBurnsIn 9s ease-out forwards; }
    .frame.active .drive-image.kb-out { animation: kenBurnsOut 9s ease-out forwards; }

    @keyframes kenBurnsIn {
      from { transform: scale(1) translate(0, 0); }
      to   { transform: scale(1.09) translate(-1.5%, -1%); }
    }
    @keyframes kenBurnsOut {
      from { transform: scale(1.09) translate(1.5%, 1%); }
      to   { transform: scale(1) translate(0, 0); }
    }

    @media (prefers-reduced-motion: reduce) {
      .frame.active .drive-image.kb-in,
      .frame.active .drive-image.kb-out {
        animation: none;
      }
      .frame { transition: opacity .4s ease-in-out; }
    }

    /* Placeholder cuando una imagen falla */
    .frame.frame-error .frame-inner {
      color: rgba(244,241,234,0.35);
      font-size: .9rem;
      letter-spacing: 0.05em;
    }

    .info-overlay {
      position: absolute; bottom: 60px; left: 0; right: 0;
      color: var(--ink); text-align: center;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.85);
      z-index: 2;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity .9s ease .4s, transform .9s ease .4s;
    }

    .frame.active .info-overlay {
      opacity: 1;
      transform: translateY(0);
    }

    .info-overlay h1 {
      font-size: clamp(1.2rem, 3.4vw, 1.9rem);
      font-weight: 400;
      letter-spacing: 0.03em;
    }

    .info-overlay p {
      font-size: clamp(.75rem, 2vw, .95rem);
      color: rgba(244,241,234,0.7);
      margin-top: 6px;
      font-style: italic;
    }

    /* ---------- VIÑETA / GRANO DE PELÍCULA ---------- */
    #vignette {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 5;
      background: radial-gradient(ellipse at center, transparent 45%, rgba(0,0,0,0.55) 100%);
    }

    #grain {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 6;
      opacity: 0.05;
      mix-blend-mode: overlay;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    }

    @media (prefers-reduced-motion: reduce) {
      #grain { display: none; }
    }

    /* ---------- CONTADOR ---------- */
    #counter {
      position: fixed; top: 24px; right: 28px;
      z-index: 10;
      color: rgba(244,241,234,0.55);
      font-size: .8rem;
      letter-spacing: 0.1em;
      text-shadow: 1px 1px 4px rgba(0,0,0,0.8);
      opacity: 0;
      transition: opacity .8s ease;
    }
    #counter.visible { opacity: 1; }

    /* ---------- BARRA DE PROGRESO ---------- */
    #progress-track {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 3px;
      background: rgba(255,255,255,0.08);
      z-index: 10;
      opacity: 0;
      transition: opacity .8s ease;
    }
    #progress-track.visible { opacity: 1; }

    #progress-fill {
      height: 100%;
      width: 0%;
      background: var(--accent);
      box-shadow: 0 0 8px rgba(232,192,125,0.6);
    }

    /* ---------- CONTROLES DISCRETOS ---------- */
    #controls {
      position: fixed; top: 24px; left: 28px;
      z-index: 10;
      display: flex; gap: 14px;
      opacity: 0;
      transition: opacity .8s ease;
    }
    #controls.visible { opacity: .55; }
    #controls:hover { opacity: 1 !important; }

    #controls button {
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(244,241,234,0.35);
      color: var(--ink);
      width: 34px; height: 34px;
      border-radius: 50%;
      cursor: pointer;
      font-size: .85rem;
      display: flex; align-items: center; justify-content: center;
      transition: background .25s ease, border-color .25s ease;
    }

    #controls button:hover {
      background: rgba(0,0,0,0.6);
      border-color: var(--accent);
    }

    /* ---------- PANTALLA FINAL ---------- */
    #end-screen {
      position: fixed; inset: 0;
      z-index: 20;
      display: flex; align-items: center; justify-content: center;
      background: #000;
      color: rgba(244,241,234,0.6);
      font-size: clamp(1rem, 2.6vw, 1.3rem);
      font-style: italic;
      letter-spacing: 0.04em;
      opacity: 0;
      pointer-events: none;
      transition: opacity 2s ease;
    }
    #end-screen.visible { opacity: 1; pointer-events: auto; }

    #cine-audio { display: none; }

    .sr-only {
      position: absolute; width: 1px; height: 1px;
      overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap;
    }
  </style>
</head>
<body>

  <!-- Pantalla de bienvenida: además resuelve el bloqueo de autoplay -->
  <div id="welcome-screen">
    <h1>Un recuerdo, una luz</h1>
    <p class="subtitle">Una pequeña proyección de momentos que quiero recordar contigo</p>
    <button id="start-button" type="button">▶ Comenzar</button>
    <div id="welcome-loader"></div>
  </div>

  <div id="cine-container">
    <div id="vignette"></div>
    <div id="grain"></div>

    <div id="counter" aria-hidden="true"></div>
    <div id="controls">
      <button id="btn-pause" type="button" aria-label="Pausar o reanudar">⏸</button>
      <button id="btn-mute" type="button" aria-label="Silenciar o activar sonido">🔊</button>
    </div>

    <div id="progress-track"><div id="progress-fill"></div></div>

    <div id="end-screen">Fin de la proyección</div>

    <audio id="cine-audio" preload="auto">
      Tu navegador no soporta la reproducción de audio.
    </audio>

    <div id="live-region" class="sr-only" aria-live="polite"></div>
  </div>

  <script defer>
  (function () {
  'use strict';

  // ============================================================
  // 1. DATOS: recuerdos y pistas de audio
  // ============================================================
  const misRecuerdos = [
    { id: "17EcqwTl7ZgE142WlcI2bSmDBQntQTH5E", titulo: "Risas", fecha: "2023" },
    { id: "12cFguQajr9ykc5qy0QrmU4Cwq09jqYMf", titulo: "Luz en tus ojos", fecha: "2023" },
    { id: "10mM0Lyu8vqGp33kIiXKGsGzcO0bAvxJV", titulo: "Sueños compartidos", fecha: "2023" },
    { id: "1kZ9f5t4D1Z9k2-NJdHM89DwWg-GXQWbQ", titulo: "Juntos", fecha: "2023" },
    { id: "1-xA0VinFW8UhhQoZWorheYQaOnsk-1EU", titulo: "Amor verdadero", fecha: "2024" },
    { id: "1aYPNq6lD-n9LRhe2-P_tg1c6DRyutqsp", titulo: "Recuerdo dorado", fecha: "Febrero 2024" },
    { id: "1Zn4nC7C6aGDRawsfPVwzKtXZs13pjwJp", titulo: "Otoño juntos", fecha: "Noviembre 2023" },
    { id: "1W-5xSTh9Cz4_Ejgcr7xftfkbHgEFYTVf", titulo: "Primavera", fecha: "Abril 2024" },
    { id: "1VIGb4E9L0ZnMujg-dTEtfyGwk_zQHhQ8", titulo: "Eres mi hogar", fecha: "Abril 2024" },
    { id: "1FhzwmBUVv5YzTTGaHB7_b26J5KIWGv5l", titulo: "Abril contigo", fecha: "Abril 2024" },
    { id: "12uhLUJBGFEZRTlekdv54mJuROemFiXs9", titulo: "Eres todo", fecha: "Abril 2024" },
    { id: "12VAgMbTlqNkmaL3-h552BXxeCtYsY8x6", titulo: "Instante bello", fecha: "2024" },
    { id: "12usQeIxSrt2Mm3Uwsd5q3Pig879XL1AC", titulo: "Calma", fecha: "2024" },
    { id: "13C45n0Zpxtwx_tBD95-faoNJN7E5SS3B", titulo: "Alegría", fecha: "2024" },
    { id: "13OECDw5pLX0GoLqhwZiaaRwLU028j-f-", titulo: "Paz a tu lado", fecha: "2024" },
    { id: "13tpM0Y-cZFwtfx8OQ7elltM8uNQ6kixE", titulo: "Eres luz", fecha: "2024" },
    { id: "154AxMngzxmcU499NhST8rqgYYELdrUV-", titulo: "Mi persona", fecha: "2024" },
    { id: "15ZsZScL-ve9taB0R3qt7RDVRXU6_iwin", titulo: "Siempre", fecha: "2025" },
    { id: "15wEUbxPRhX2sUEtw9t4VIiN0Tcqh6HuV", titulo: "Contigo", fecha: "2025" },
    { id: "16kD_b7QgxVq4j-cWoDHKgtB9DXgT5wLF", titulo: "Universo nuestro", fecha: "2025" },
    { id: "17MyIWxYotdnzEae95mPc0rvzzaMsd8Ip", titulo: "Eres magia", fecha: "2025" },
    { id: "18_9byESKd8A9VU_AaQefjBAZdCV0utyG", titulo: "Corazón latiendo", fecha: "2025" },
    { id: "18auW03EmZzd16HnOeuNAmC-0Hcldo6qO", titulo: "Días felices", fecha: "2025" },
    { id: "193jW-umS6YeTiAbSwzkGR00KBbN1hkZs", titulo: "Noches", fecha: "2025" },
    { id: "1AMBnW_-lXIjmRblyX22JO706GfxZGhtV", titulo: "Estrellas", fecha: "2025" },
    { id: "1Cj49txzrFOH352gscUQyqXnyjBcBWYys", titulo: "Suspiros", fecha: "2024" },
    { id: "1Dl_BrttB7I4ejNp-dFOc8mwvB43cuUy_", titulo: "Latido", fecha: "2025" },
    { id: "1DrTUZTzSSCs9AOUG7NybpXCC9Tn5cuyH", titulo: "Eres sueño", fecha: "2025" },
    { id: "1EIHypsZ-Molo07ncg4GwdlcfsDm_ihsv", titulo: "Realidad", fecha: "2025" },
    { id: "1EMN0jK74e7xZDffIVQbHHSUXX8yPDr3L", titulo: "Bendición", fecha: "2025" },
    { id: "1F1gQFuTi1QJAhKiCJJBU-4mYQi3k1trS", titulo: "Regalo", fecha: "2025" },
    { id: "1FXvCxZe7bTF44hD_WYPopc_SsuyO0DNq", titulo: "Tesoro", fecha: "2025" },
  ];

  // Playlist de audio: agrega tantas pistas como quieras, se reproducen en orden
  // y al terminar la última se muestra la pantalla de cierre.
  const playlist = [
    "https://ia902800.us.archive.org/5/items/stephen-sanchez-until-i-found-you-official-video-gxld-q-9e-x-2wo_202607/Stephen%20Sanchez%20-%20Until%20I%20Found%20You%20%28Official%20Video%29%20%5BGxldQ9eX2wo%5D.mp3"
  ];

  // ============================================================
  // 2. CONFIGURACIÓN
  // ============================================================
  const CONFIG = {
    minSecondsPerPhoto: 4,      // piso: nunca menos de esto por foto
    maxSecondsPerPhoto: 7,      // techo: nunca más de esto por foto
    fallbackSecondsPerPhoto: 5, // usado si no se puede leer la duración del audio
    fadeDurationMs: 1200,       // duración del fade in/out de audio
    imageWidth: 1200,           // ancho solicitado a Google Drive
  };

  const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // ============================================================
  // 3. ESTADO
  // ============================================================
  let currentIndex = 0;
  let trackIndex = 0;
  let intervaloCambio = null;
  let secondsPerPhoto = CONFIG.fallbackSecondsPerPhoto;
  let isPaused = false;
  let progressRAF = null;
  let frameStartTime = 0;

  // ============================================================
  // 4. REFERENCIAS DOM
  // ============================================================
  const welcomeScreen = document.getElementById('welcome-screen');
  const startButton = document.getElementById('start-button');
  const welcomeLoader = document.getElementById('welcome-loader');
  const container = document.getElementById('cine-container');
  const audioElement = document.getElementById('cine-audio');
  const counterEl = document.getElementById('counter');
  const progressTrack = document.getElementById('progress-track');
  const progressFill = document.getElementById('progress-fill');
  const endScreen = document.getElementById('end-screen');
  const controls = document.getElementById('controls');
  const btnPause = document.getElementById('btn-pause');
  const btnMute = document.getElementById('btn-mute');
  const liveRegion = document.getElementById('live-region');

  // ============================================================
  // 5. CONSTRUCCIÓN DE FRAMES + PRECARGA DE IMÁGENES
  // ============================================================
  function driveUrl(id) {
    return `https://lh3.googleusercontent.com/d/${id}=w${CONFIG.imageWidth}`;
  }

  function crearFrame(recuerdo, index) {
    const frame = document.createElement('div');
    frame.className = 'frame';
    frame.dataset.index = String(index);

    const inner = document.createElement('div');
    inner.className = 'frame-inner';

    const img = document.createElement('img');
    // alterna la dirección del Ken Burns para que no se sienta repetitivo
    img.className = 'drive-image ' + (index % 2 === 0 ? 'kb-in' : 'kb-out');
    img.src = driveUrl(recuerdo.id);
    img.alt = recuerdo.titulo;

    img.onerror = () => {
      frame.classList.add('frame-error');
      inner.innerHTML = `<span>“${recuerdo.titulo}” — imagen no disponible</span>`;
    };

    inner.appendChild(img);
    frame.appendChild(inner);

    const overlay = document.createElement('div');
    overlay.className = 'info-overlay';
    overlay.innerHTML = `<h1>${recuerdo.titulo}</h1><p>${recuerdo.fecha}</p>`;
    frame.appendChild(overlay);

    container.insertBefore(frame, progressTrack);
    return frame;
  }

  function precargarImagenes(recuerdos) {
    let cargadas = 0;
    const total = recuerdos.length;

    return Promise.all(
      recuerdos.map(
        (r) =>
          new Promise((resolve) => {
            const img = new Image();
            const done = () => {
              cargadas++;
              if (welcomeLoader) {
                welcomeLoader.textContent = `Cargando recuerdos… ${cargadas}/${total}`;
              }
              resolve();
            };
            img.onload = done;
            img.onerror = done; // no bloquear la proyección por una imagen caída
            img.src = driveUrl(r.id);
          })
      )
    );
  }

  function cargarCine() {
    misRecuerdos.forEach((recuerdo, i) => crearFrame(recuerdo, i));
    if (playlist.length > 0) {
      const source = document.createElement('source');
      source.src = playlist[trackIndex];
      audioElement.appendChild(source);
      audioElement.load();
    }
  }

  // ============================================================
  // 6. PROYECCIÓN
  // ============================================================
  function getFrames() {
    return Array.from(document.querySelectorAll('.frame'));
  }

  function actualizarContador(frames) {
    counterEl.textContent = `${currentIndex + 1} / ${frames.length}`;
  }

  function anunciar(recuerdo) {
    liveRegion.textContent = `Mostrando: ${recuerdo.titulo}, ${recuerdo.fecha}`;
  }

  function iniciarBarraProgreso() {
    cancelAnimationFrame(progressRAF);
    frameStartTime = performance.now();
    const durationMs = secondsPerPhoto * 1000;

    function tick(now) {
      if (isPaused) {
        progressRAF = requestAnimationFrame(tick);
        return;
      }
      const elapsed = now - frameStartTime;
      const pct = Math.min(100, (elapsed / durationMs) * 100);
      progressFill.style.width = pct + '%';
      if (pct < 100) {
        progressRAF = requestAnimationFrame(tick);
      }
    }
    progressRAF = requestAnimationFrame(tick);
  }

  function avanzarFrame() {
    const frames = getFrames();
    if (frames.length === 0) return;

    frames[currentIndex].classList.remove('active');
    currentIndex = (currentIndex + 1) % frames.length;
    frames[currentIndex].classList.add('active');

    actualizarContador(frames);
    anunciar(misRecuerdos[currentIndex]);
    iniciarBarraProgreso();
  }

  function iniciarProyeccion() {
    const frames = getFrames();
    if (frames.length === 0) return;

    // Si solo hay una foto, la mostramos sin animar el intervalo
    frames[currentIndex].classList.add('active');
    actualizarContador(frames);
    anunciar(misRecuerdos[currentIndex]);
    counterEl.classList.add('visible');
    progressTrack.classList.add('visible');
    controls.classList.add('visible');
    iniciarBarraProgreso();

    if (frames.length > 1) {
      intervaloCambio = setInterval(avanzarFrame, secondsPerPhoto * 1000);
    }
  }

  function detenerProyeccion() {
    const frames = getFrames();
    frames.forEach((f) => f.classList.remove('active'));

    if (intervaloCambio) {
      clearInterval(intervaloCambio);
      intervaloCambio = null;
    }
    cancelAnimationFrame(progressRAF);
    progressFill.style.width = '0%';
    counterEl.classList.remove('visible');
    progressTrack.classList.remove('visible');
    controls.classList.remove('visible');
  }

  function calcularIntervaloDinamico() {
    const dur = audioElement.duration;
    if (!isFinite(dur) || dur <= 0 || misRecuerdos.length === 0) {
      secondsPerPhoto = CONFIG.fallbackSecondsPerPhoto;
      return;
    }
    const calculado = dur / misRecuerdos.length;
    secondsPerPhoto = Math.min(
      CONFIG.maxSecondsPerPhoto,
      Math.max(CONFIG.minSecondsPerPhoto, calculado)
    );
  }

  // ============================================================
  // 7. AUDIO: fade in/out y manejo de playlist
  // ============================================================
  function fadeAudio(target, durationMs, onComplete) {
    const start = audioElement.volume;
    const startTime = performance.now();

    function step(now) {
      const t = Math.min(1, (now - startTime) / durationMs);
      audioElement.volume = start + (target - start) * t;
      if (t < 1) {
        requestAnimationFrame(step);
      } else if (onComplete) {
        onComplete();
      }
    }
    requestAnimationFrame(step);
  }

  function reproducirPista() {
    audioElement.volume = 0;
    audioElement
      .play()
      .then(() => {
        fadeAudio(1, CONFIG.fadeDurationMs);
        if (audioElement.readyState >= 1) {
          calcularIntervaloDinamico();
        }
        iniciarProyeccion();
      })
      .catch((err) => {
        console.warn('No se pudo reproducir el audio:', err);
        // aun sin audio, mostramos la proyección igualmente
        calcularIntervaloDinamico();
        iniciarProyeccion();
      });
  }

  function siguientePista() {
    trackIndex++;
    if (trackIndex >= playlist.length) {
      finalizarProyeccion();
      return;
    }
    audioElement.innerHTML = '';
    const source = document.createElement('source');
    source.src = playlist[trackIndex];
    audioElement.appendChild(source);
    audioElement.load();
    reproducirPista();
  }

  function finalizarProyeccion() {
    fadeAudio(0, CONFIG.fadeDurationMs, () => {
      detenerProyeccion();
      endScreen.classList.add('visible');
      liveRegion.textContent = 'Proyección finalizada';
    });
  }

  // ============================================================
  // 8. CONTROLES DE USUARIO
  // ============================================================
  function togglePause() {
    isPaused = !isPaused;
    if (isPaused) {
      audioElement.pause();
      if (intervaloCambio) {
        clearInterval(intervaloCambio);
        intervaloCambio = null;
      }
      btnPause.textContent = '▶';
      btnPause.setAttribute('aria-label', 'Reanudar');
    } else {
      audioElement.play().catch(() => {});
      const frames = getFrames();
      if (frames.length > 1 && !intervaloCambio) {
        intervaloCambio = setInterval(avanzarFrame, secondsPerPhoto * 1000);
      }
      frameStartTime = performance.now();
      btnPause.textContent = '⏸';
      btnPause.setAttribute('aria-label', 'Pausar');
    }
  }

  function toggleMute() {
    audioElement.muted = !audioElement.muted;
    btnMute.textContent = audioElement.muted ? '🔇' : '🔊';
    btnMute.setAttribute('aria-label', audioElement.muted ? 'Activar sonido' : 'Silenciar');
  }

  btnPause.addEventListener('click', togglePause);
  btnMute.addEventListener('click', toggleMute);

  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
      e.preventDefault();
      togglePause();
    } else if (e.key === 'm' || e.key === 'M') {
      toggleMute();
    }
  });

  // ============================================================
  // 9. ARRANQUE: pantalla de bienvenida resuelve el bloqueo de autoplay
  // ============================================================
  function comenzar() {
    startButton.disabled = true;
    startButton.textContent = 'Cargando…';

    precargarImagenes(misRecuerdos).then(() => {
      welcomeScreen.classList.add('hidden');
      reproducirPista();
    });
  }

  function init() {
    cargarCine();
    startButton.addEventListener('click', comenzar, { once: true });

    audioElement.addEventListener('ended', () => {
      siguientePista();
    });

    if (prefersReducedMotion) {
      // Respetamos la preferencia reduciendo también el ritmo de cambio
      CONFIG.minSecondsPerPhoto = Math.max(CONFIG.minSecondsPerPhoto, 6);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
  </script>
</body>
</html>
