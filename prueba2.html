<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cine · Proyector</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { 
      width: 100vw; 
      height: 100vh; 
      overflow: hidden; 
      background: #000; 
    }

    #cine-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw; 
      height: 100vh;
      background: #000;
      overflow: hidden;
    }

    #cards-wrapper {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    .card {
      position: absolute;
      inset: 0;
      width: 100%; 
      height: 100%;
      display: grid;
      place-items: center;
      transition: opacity 1.2s ease-in-out;
      opacity: 0;
      pointer-events: none;
    }

    .card.active { 
      opacity: 1; 
      z-index: 2; 
      pointer-events: auto;
    }

    .image-container { 
      width: 100%; 
      height: 100%; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
    }
    
    .drive-image {
      max-width: 100vw; 
      max-height: 100vh;
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
    }

    #cine-audio { display: none; }
  </style>
</head>
<body>

  <div id="cine-container">
    <div id="cards-wrapper"></div>
    <audio id="cine-audio" loop preload="auto">
      <source src="https://ia600806.us.archive.org/23/items/oasis-wonderwall-official-video-bx-1-bh-8-zv-h-84/Oasis%20-%20Wonderwall%20%28Official%20Video%29%20%5Bbx1Bh8ZvH84%5D.mp3" type="audio/mpeg" />
    </audio>
  </div>

  <script>
    (function() {
      'use strict';

      const IMAGE_IDS = ["1pm2svUFVCKT20qZb9E367L_oBgRJZFx-", "1ImtKk7UWGNKHqpLvwVlCd5NrW99pgFuj", "1_hqX3nT0VXInR_Z38Y4ZxDRYZWnS0uJL"]; // Agrega aquí el resto de tus IDs
      const INTERVAL_MS = 5000;
      const wrapper = document.getElementById('cards-wrapper');
      let currentIndex = 0;

      function init() {
        IMAGE_IDS.forEach((id, index) => {
          const url = `https://lh3.googleusercontent.com/d/${id}=w1000`;
          const card = document.createElement('div');
          card.className = `card ${index === 0 ? 'active' : ''}`;
          card.innerHTML = `
            <div class="image-container">
                <img class="drive-image" src="${url}" alt="Recuerdo ${index + 1}" />
            </div>
          `;
          wrapper.appendChild(card);
        });

        setInterval(cambiarImagen, INTERVAL_MS);
      }

      function cambiarImagen() {
        const cards = document.querySelectorAll('.card');
        if (cards.length === 0) return;
        cards[currentIndex].classList.remove('active');
        currentIndex = (currentIndex + 1) % cards.length;
        cards[currentIndex].classList.add('active');
      }

      // Audio Autoplay al primer clic
      const playAudio = () => {
        const audio = document.getElementById('cine-audio');
        if (audio) {
          audio.play().catch(() => {});
        }
        document.removeEventListener('click', playAudio);
        document.removeEventListener('touchstart', playAudio);
      };
      
      document.addEventListener('click', playAudio);
      document.addEventListener('touchstart', playAudio);

      init();
    })();
  </script>
</body>
</html>
