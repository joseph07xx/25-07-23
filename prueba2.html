<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cine · Proyector</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html { width: 100vw; height: 100vh; overflow: hidden; background: #000; }

    #cine-container {
      width: 100vw; height: 100vh;
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }

    .frame {
      position: absolute;
      width: 100vw; height: 100vh;
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      transition: opacity 1.5s ease-in-out;
      pointer-events: none;
    }

    .frame.active { opacity: 1; z-index: 1; }

    .drive-image {
      max-width: 90vw; max-height: 80vh;
      object-fit: contain;
      box-shadow: 0 0 50px rgba(0,0,0,0.5);
    }

    .info-overlay {
      position: absolute; bottom: 50px; color: white; text-align: center;
      font-family: sans-serif; text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
      z-index: 2;
    }

    #cine-audio { display: none; }
  </style>
</head>
<body>

  <div id="cine-container">
    <audio id="cine-audio" loop preload="auto">
      <source src="https://ia600806.us.archive.org/23/items/oasis-wonderwall-official-video-bx-1-bh-8-zv-h-84/Oasis%20-%20Wonderwall%20%28Official%20Video%29%20%5Bbx1Bh8ZvH84%5D.mp3" type="audio/mpeg" />
      Tu navegador no soporta la reproducción de audio.
    </audio>
  </div>

  <script>
    (function() {
      'use strict';

      const misRecuerdos = [
          { id: "1pm2svUFVCKT20qZb9E367L_oBgRJZFx-", titulo: "Nuestro comienzo", fecha: "2023" },
          { id: "1ImtKk7UWGNKHqpLvwVlCd5NrW99pgFuj", titulo: "Mirada que enamora", fecha: "Agosto 2023" },
          { id: "1_hqX3nT0VXInR_Z38Y4ZxDRYZWnS0uJL", titulo: "Atardecer juntos", fecha: "Septiembre 2023" },
          { id: "1WN4bmVzBAEt43aTIfbwcNDsclg2k7BQc", titulo: "Sonrisas sinceras", fecha: "Octubre 2024" }
      ];

      const container = document.getElementById('cine-container');
      const audioElement = document.getElementById('cine-audio');
      let currentIndex = 0;
      let proyeccionIniciada = false;    // Ya se mostró alguna imagen
      let temporizadorActivo = false;    // Ya se programó el temporizador

      // 1. Cargar los frames (todos ocultos)
      function cargarCine() {
          misRecuerdos.forEach((recuerdo) => {
              const url = `https://lh3.googleusercontent.com/d/${recuerdo.id}=w1200`;
              const frame = document.createElement('div');
              frame.className = 'frame';  // sin 'active'
              frame.innerHTML = `
                  <img class="drive-image" src="${url}" alt="${recuerdo.titulo}" loading="lazy" />
                  <div class="info-overlay">
                      <h1>${recuerdo.titulo}</h1>
                      <p>${recuerdo.fecha}</p>
                  </div>
              `;
              container.appendChild(frame);
          });
      }

      // 2. Iniciar la proyección de imágenes (mostrar primera y luego cambiar cada 5s)
      function iniciarProyeccion() {
          if (proyeccionIniciada) return;
          proyeccionIniciada = true;

          const frames = document.querySelectorAll('.frame');
          if (frames.length === 0) return;

          frames[currentIndex].classList.add('active');

          setInterval(() => {
              frames[currentIndex].classList.remove('active');
              currentIndex = (currentIndex + 1) % frames.length;
              frames[currentIndex].classList.add('active');
          }, 5000);
      }

      // 3. Función que se llama cuando el audio comienza a reproducirse
      function cuandoAudioComienza() {
          if (temporizadorActivo) return;
          temporizadorActivo = true;

          console.log('🎵 Audio en reproducción. Esperando 16.20s para mostrar imágenes...');

          setTimeout(() => {
              iniciarProyeccion();
          }, 16200); // 16.20 segundos
      }

      // 4. Intento de autoplay al cargar
      function intentarAutoplay() {
          const promesa = audioElement.play();
          if (promesa !== undefined) {
              promesa
                  .then(() => {
                      cuandoAudioComienza();
                  })
                  .catch(() => {
                      console.warn('⚠️ Autoplay bloqueado. Esperando clic/touch del usuario.');
                      // Listeners para activar con interacción
                      const handler = function(e) {
                          audioElement.play()
                              .then(() => {
                                  cuandoAudioComienza();
                                  document.removeEventListener('click', handler);
                                  document.removeEventListener('touchstart', handler);
                              })
                              .catch((err) => console.warn('Error al reproducir con interacción:', err));
                      };
                      document.addEventListener('click', handler);
                      document.addEventListener('touchstart', handler);
                  });
          } else {
              // Navegador antiguo
              audioElement.play();
              cuandoAudioComienza();
          }
      }

      // 5. Inicialización
      function init() {
          cargarCine();
          intentarAutoplay();
      }

      if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', init);
      } else {
          init();
      }
    })();
  </script>
</body>
</html>
