<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cine · Proyector</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html { width: 100vw; height: 100vh; overflow: hidden; background: #000; }

    #cine-container {
      width: 100vw; height: 100vh;
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }

    .frame {
      position: absolute;
      width: 100vw; height: 100vh;
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      transition: opacity 1.5s ease-in-out;
      pointer-events: none;
    }

    .frame.active { opacity: 1; z-index: 1; }

    .drive-image {
      max-width: 90vw; max-height: 80vh;
      object-fit: contain;
      box-shadow: 0 0 50px rgba(0,0,0,0.5);
    }

    .info-overlay {
      position: absolute; bottom: 50px; color: white; text-align: center;
      font-family: sans-serif; text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
      z-index: 2;
    }

    /* Mensaje opcional para guiar al usuario a hacer clic */
    #start-screen {
      position: absolute;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background: #000;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: white; font-family: sans-serif; z-index: 9999;
      cursor: pointer;
      transition: opacity 1s ease;
    }
    #start-screen h2 { font-weight: 300; letter-spacing: 2px; font-size: 1.5rem; }

    #cine-audio { display: none; }
  </style>
</head>
<body>

  <!-- Pantalla inicial para asegurar el clic del usuario -->
  <div id="start-screen">
    <h2>Toca en cualquier lugar para comenzar ✦</h2>
  </div>

  <div id="cine-container">
    <audio id="cine-audio" loop preload="auto">
      <source src="https://ia600806.us.archive.org/23/items/oasis-wonderwall-official-video-bx-1-bh-8-zv-h-84/Oasis%20-%20Wonderwall%20%28Official%20Video%29%20%5Bbx1Bh8ZvH84%5D.mp3" type="audio/mpeg" />
      Tu navegador no soporta la reproducción de audio.
    </audio>
  </div>

  <script>
    (function() {
      'use strict';

      const misRecuerdos = [
          { id: "1pm2svUFVCKT20qZb9E367L_oBgRJZFx-", titulo: "Nuestro comienzo", fecha: "2023" },
          { id: "1ImtKk7UWGNKHqpLvwVlCd5NrW99pgFuj", titulo: "Mirada que enamora", fecha: "Agosto 2023" },
          { id: "1_hqX3nT0VXInR_Z38Y4ZxDRYZWnS0uJL", titulo: "Atardecer juntos", fecha: "Septiembre 2023" },
          { id: "1WN4bmVzBAEt43aTIfbwcNDsclg2k7BQc", titulo: "Sonrisas sinceras", fecha: "Octubre 2024" }
      ];

      const container = document.getElementById('cine-container');
      const audioElement = document.getElementById('cine-audio');
      const startScreen = document.getElementById('start-screen');
      let currentIndex = 0;
      let iniciado = false;

      // 1. Cargar las imágenes (todas ocultas con opacidad 0, ninguna activa)
      function cargarCine() {
          misRecuerdos.forEach((recuerdo) => {
              const url = `https://lh3.googleusercontent.com/d/${recuerdo.id}=w1200`;
              const frame = document.createElement('div');
              frame.className = 'frame'; // Nace sin la clase 'active' (totalmente en negro)
              frame.innerHTML = `
                  <img class="drive-image" src="${url}" alt="${recuerdo.titulo}" loading="lazy" />
                  <div class="info-overlay">
                      <h1>${recuerdo.titulo}</h1>
                      <p>${recuerdo.fecha}</p>
                  </div>
              `;
              container.appendChild(frame);
          });
      }

      // 2. Iniciar la proyección de las imágenes de forma cíclica
      function arrancarProyeccionVisual() {
          const frames = document.querySelectorAll('.frame');
          if (frames.length === 0) return;

          // Mostrar la primera imagen tras los 16.27 segundos
          frames[currentIndex].classList.add('active');

          // Cambiar de imagen cada 5 segundos
          setInterval(() => {
              frames[currentIndex].classList.remove('active');
              currentIndex = (currentIndex + 1) % frames.length;
              frames[currentIndex].classList.add('active');
          }, 5000);
      }

      // 3. Manejador de la interacción del usuario
      function activarExperiencia(e) {
          if (iniciado) return;
          iniciado = true;

          // Ocultar pantalla de inicio
          startScreen.style.opacity = '0';
          setTimeout(() => { startScreen.remove(); }, 1000);

          // Reproducir el audio inmediatamente
          audioElement.play()
              .then(() => {
                  console.log('🎵 Audio reproduciéndose con normalidad');
              })
              .catch((err) => {
                  console.warn('⚠️ Error al reproducir audio:', err);
              });

          // Exactamente 16.27 segundos (16270 ms) después del clic, arrancan las imágenes
          setTimeout(() => {
              arrancarProyeccionVisual();
          }, 16270);

          // Limpiar eventos globales
          document.removeEventListener('click', activarExperiencia);
          document.removeEventListener('touchstart', activarExperiencia);
      }

      // Inicialización
      function init() {
          cargarCine();
          // Esperar estrictamente a que el usuario interactúe
          document.addEventListener('click', activarExperiencia);
          document.addEventListener('touchstart', activarExperiencia);
      }

      if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', init);
      } else {
          init();
      }

    })();
  </script>
</body>
</html>
