<!-- <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>✦ Eternidad · Portal del Amor ✦</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Exo+2:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet" />
    <style>
        /* ============================================================
           RESET Y VARIABLES
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --rosa-neon: #ff2d75;
            --cian-neon: #00e5ff;
            --violeta-neon: #b026ff;
            --naranja-neon: #ff9e00;
            --negro-fondo: #0b0a0f;
            --gris-oscuro: #1c1a24;
            --texto-claro: #eaeaea;
            --glass-bg: rgba(20, 18, 30, 0.6);
            --border-glass: rgba(255, 255, 255, 0.08);
            --sombra-rosa: 0 0 40px rgba(255, 45, 117, 0.4);
            --sombra-cian: 0 0 40px rgba(0, 229, 255, 0.4);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--negro-fondo);
            color: var(--texto-claro);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* ============================================================
           FONDO DINÁMICO
           ============================================================ */
        .fondo-radical {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .fondo-radical .grid-lineas {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        .fondo-radical .gradiente-animado {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 20% 30%, rgba(255, 45, 117, 0.2) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(0, 229, 255, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(176, 38, 255, 0.1) 0%, transparent 70%);
            animation: moverGradiente 14s ease-in-out infinite alternate;
        }

        @keyframes moverGradiente {
            0% {
                background-position: 0% 0%;
                transform: scale(1);
            }
            100% {
                background-position: 100% 100%;
                transform: scale(1.05);
            }
        }

        /* Partículas (generadas por JS) */
        .particula-neon {
            position: absolute;
            border-radius: 50%;
            filter: blur(6px);
            pointer-events: none;
            will-change: transform, opacity;
            animation: flotarParticulaNeon linear infinite;
        }

        @keyframes flotarParticulaNeon {
            0% {
                transform: translateY(100vh) scale(0.2) rotate(0deg);
                opacity: 0;
            }
            15% {
                opacity: 0.8;
            }
            85% {
                opacity: 0.8;
            }
            100% {
                transform: translateY(-10vh) scale(1.8) rotate(720deg);
                opacity: 0;
            }
        }

        /* Partículas interactivas (siguen al ratón) */
        .particula-interactiva {
            position: fixed;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 45, 117, 0.5) 0%, transparent 70%);
            filter: blur(8px);
            pointer-events: none;
            will-change: transform, opacity;
            transition: transform 0.1s ease-out, opacity 0.3s ease;
            z-index: 0;
        }

        /* ============================================================
           CONTENEDOR PRINCIPAL
           ============================================================ */
        .main-container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 50px;
            padding: 20px 0;
        }

        /* ============================================================
           HEADER
           ============================================================ */
        .header-radical {
            text-align: center;
            width: 100%;
            padding: 10px 0;
            position: relative;
        }

        .header-radical .titulo-principal {
            font-family: 'Orbitron', monospace;
            font-size: clamp(2.8rem, 10vw, 5.5rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 6px;
            background: linear-gradient(135deg, var(--rosa-neon), var(--violeta-neon), var(--cian-neon));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 40px rgba(255, 45, 117, 0.3), 0 0 80px rgba(176, 38, 255, 0.2);
            animation: brilloNeon 3s ease-in-out infinite alternate;
            display: inline-block;
            position: relative;
            transition: transform 0.2s ease;
        }

        .header-radical .titulo-principal::after {
            content: '';
            position: absolute;
            inset: -8px -20px;
            background: radial-gradient(circle, rgba(255, 45, 117, 0.15) 0%, transparent 70%);
            filter: blur(30px);
            z-index: -1;
            animation: pulsoGlow 4s ease-in-out infinite alternate;
        }

        @keyframes brilloNeon {
            0% {
                text-shadow: 0 0 20px rgba(255, 45, 117, 0.3), 0 0 60px rgba(176, 38, 255, 0.2);
            }
            100% {
                text-shadow: 0 0 40px rgba(0, 229, 255, 0.5), 0 0 100px rgba(255, 45, 117, 0.3);
            }
        }

        @keyframes pulsoGlow {
            0% {
                opacity: 0.4;
                transform: scale(1);
            }
            100% {
                opacity: 0.9;
                transform: scale(1.1);
            }
        }

        .header-radical .subtitulo {
            font-family: 'Exo 2', sans-serif;
            font-weight: 300;
            font-size: clamp(1.2rem, 3vw, 2rem);
            color: var(--texto-claro);
            margin-top: 6px;
            letter-spacing: 8px;
            opacity: 0.8;
            text-transform: uppercase;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            display: inline-block;
            padding: 8px 24px;
        }

        .header-radical .subtitulo span {
            color: var(--cian-neon);
            font-weight: 600;
            text-shadow: 0 0 30px rgba(0, 229, 255, 0.3);
        }

        /* ============================================================
           CONTADOR RADICAL MEJORADO
           ============================================================ */
        .seccion-contador-radical {
            width: 100%;
            max-width: 1100px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-glass);
            border-radius: 60px;
            padding: 40px 30px;
            box-shadow: 0 0 60px rgba(0, 229, 255, 0.06), inset 0 0 60px rgba(255, 45, 117, 0.03);
            transition: 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .seccion-contador-radical::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            border-radius: 62px;
            background: linear-gradient(135deg, var(--rosa-neon), var(--violeta-neon), var(--cian-neon));
            z-index: -1;
            opacity: 0.2;
            background-size: 300% 300%;
            animation: moverBordeNeon 6s ease-in-out infinite alternate;
        }

        @keyframes moverBordeNeon {
            0% {
                background-position: 0% 0%;
                opacity: 0.15;
            }
            50% {
                opacity: 0.4;
            }
            100% {
                background-position: 100% 100%;
                opacity: 0.15;
            }
        }

        .contador-titulo-radical {
            text-align: center;
            font-family: 'Orbitron', monospace;
            font-size: 1.2rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--cian-neon);
            margin-bottom: 24px;
            font-weight: 400;
            text-shadow: 0 0 20px rgba(0, 229, 255, 0.3);
        }

        .contador-titulo-radical .icono {
            color: var(--rosa-neon);
            margin: 0 10px;
            display: inline-block;
            animation: latidoIcono 2s ease-in-out infinite;
        }

        @keyframes latidoIcono {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.2);
            }
        }

        .contador-grid-radical {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 16px;
            justify-items: center;
        }

        .tarjeta-tiempo-radical {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 30px;
            padding: 18px 12px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            backdrop-filter: blur(4px);
            text-align: center;
            will-change: transform;
        }

        .tarjeta-tiempo-radical:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: var(--cian-neon);
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.15);
            background: rgba(0, 229, 255, 0.04);
        }

        .tarjeta-tiempo-radical .numero {
            font-family: 'Orbitron', monospace;
            font-size: 2.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--rosa-neon), var(--cian-neon));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            line-height: 1.2;
            text-shadow: 0 0 40px rgba(255, 45, 117, 0.2);
            transition: transform 0.15s ease;
            display: inline-block;
        }

        /* Animación de "salto" al cambiar el número */
        .numero-saltar {
            animation: saltarNumero 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes saltarNumero {
            0% {
                transform: scale(0.5);
                opacity: 0.3;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .tarjeta-tiempo-radical .etiqueta {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 4px;
            font-weight: 500;
        }

        /* Barra de progreso debajo de cada tarjeta */
        .barra-progreso {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 4px;
            margin-top: 10px;
            overflow: hidden;
        }

        .barra-progreso .relleno {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--rosa-neon), var(--cian-neon));
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        .contador-segundos-total-radical {
            text-align: center;
            margin-top: 28px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 2px;
        }

        .contador-segundos-total-radical span {
            color: var(--naranja-neon);
            font-weight: 700;
            font-size: 1.3rem;
            font-family: 'Orbitron', monospace;
            text-shadow: 0 0 30px rgba(255, 158, 0, 0.3);
        }

        /* ============================================================
           LÍNEA DE TIEMPO (NUEVA SECCIÓN)
           ============================================================ */
        .seccion-timeline {
            width: 100%;
            max-width: 1100px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-glass);
            border-radius: 60px;
            padding: 40px 30px;
            text-align: center;
        }

        .seccion-timeline h2 {
            font-family: 'Orbitron', monospace;
            font-size: 1.5rem;
            letter-spacing: 3px;
            color: var(--violeta-neon);
            margin-bottom: 30px;
            text-shadow: 0 0 30px rgba(176, 38, 255, 0.3);
        }

        .timeline-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .timeline-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 30px;
            padding: 20px 15px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: 0.4s ease;
            position: relative;
        }

        .timeline-item:hover {
            transform: translateY(-6px);
            border-color: var(--rosa-neon);
            box-shadow: 0 0 30px rgba(255, 45, 117, 0.1);
        }

        .timeline-item .fecha {
            font-family: 'Orbitron', monospace;
            font-size: 0.8rem;
            color: var(--cian-neon);
            letter-spacing: 2px;
            opacity: 0.7;
        }

        .timeline-item .evento {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            margin: 8px 0 4px;
            color: var(--texto-claro);
        }

        .timeline-item .descripcion {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 300;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .timeline-item .emoji {
            font-size: 2rem;
            display: block;
            margin-bottom: 6px;
        }

        /* ============================================================
           TARJETAS DE ACCESO MEJORADAS
           ============================================================ */
        .grid-tarjetas-radical {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 1100px;
        }

        .card-radical {
            position: relative;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-glass);
            border-radius: 40px;
            padding: 40px 25px;
            text-decoration: none;
            color: var(--texto-claro);
            transition: 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            min-height: 240px;
            justify-content: center;
            gap: 10px;
            will-change: transform;
        }

        .card-radical::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 42px;
            background: linear-gradient(135deg, var(--rosa-neon), var(--violeta-neon), var(--cian-neon));
            opacity: 0;
            transition: opacity 0.6s ease;
            z-index: -1;
            background-size: 300% 300%;
            animation: moverBordeNeon 6s ease-in-out infinite alternate;
        }

        .card-radical:hover::before {
            opacity: 0.5;
        }

        .card-radical:hover {
            transform: translateY(-14px) scale(1.02);
            border-color: transparent;
            box-shadow: 0 20px 60px rgba(0, 229, 255, 0.15), 0 0 80px rgba(255, 45, 117, 0.08);
            background: rgba(20, 18, 30, 0.85);
        }

        .card-radical .icono-card {
            font-size: 3.5rem;
            line-height: 1;
            filter: drop-shadow(0 0 20px rgba(255, 45, 117, 0.3));
            transition: 0.4s ease;
        }

        .card-radical:hover .icono-card {
            transform: scale(1.15) rotate(-6deg);
            filter: drop-shadow(0 0 40px rgba(0, 229, 255, 0.5));
        }

        .card-radical h2 {
            font-family: 'Orbitron', monospace;
            font-size: 1.3rem;
            font-weight: 600;
            letter-spacing: 2px;
            background: linear-gradient(135deg, var(--cian-neon), var(--violeta-neon));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 4px 0;
        }

        .card-radical p {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 300;
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.5);
            max-width: 260px;
            line-height: 1.5;
        }

        .card-radical .btn-neon {
            display: inline-block;
            margin-top: 8px;
            padding: 8px 28px;
            border-radius: 40px;
            background: transparent;
            border: 1.5px solid rgba(255, 255, 255, 0.1);
            color: var(--texto-claro);
            font-family: 'Rajdhani', sans-serif;
            font-weight: 600;
            font-size: 0.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: 0.4s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .card-radical .btn-neon::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--rosa-neon), var(--cian-neon));
            opacity: 0;
            border-radius: 40px;
            transition: opacity 0.4s ease;
            z-index: -1;
        }

        .card-radical:hover .btn-neon {
            border-color: transparent;
            color: var(--negro-fondo);
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.3);
        }

        .card-radical:hover .btn-neon::before {
            opacity: 1;
        }

        /* ============================================================
           BOTÓN SORPRESA
           ============================================================ */
        .boton-sorpresa {
            margin-top: 10px;
            padding: 14px 40px;
            border-radius: 60px;
            background: transparent;
            border: 2px solid var(--rosa-neon);
            color: var(--rosa-neon);
            font-family: 'Orbitron', monospace;
            font-size: 0.9rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.4s ease;
            box-shadow: 0 0 20px rgba(255, 45, 117, 0.2);
            position: relative;
            overflow: hidden;
        }

        .boton-sorpresa::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--rosa-neon), var(--violeta-neon));
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: -1;
            border-radius: 60px;
        }

        .boton-sorpresa:hover {
            color: var(--negro-fondo);
            border-color: transparent;
            box-shadow: 0 0 60px rgba(255, 45, 117, 0.4);
            transform: scale(1.05);
        }

        .boton-sorpresa:hover::before {
            opacity: 1;
        }

        /* ============================================================
           MODAL (Mensaje Secreto)
           ============================================================ */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 999;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.activo {
            display: flex;
        }

        .modal-contenido {
            background: var(--gris-oscuro);
            border: 1px solid var(--border-glass);
            border-radius: 50px;
            max-width: 550px;
            width: 100%;
            padding: 40px 30px;
            text-align: center;
            position: relative;
            box-shadow: 0 0 80px rgba(176, 38, 255, 0.2);
            animation: modalEntrada 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes modalEntrada {
            0% {
                transform: scale(0.8) translateY(40px);
                opacity: 0;
            }
            100% {
                transform: scale(1) translateY(0);
                opacity: 1;
            }
        }

        .modal-contenido h2 {
            font-family: 'Orbitron', monospace;
            font-size: 1.8rem;
            background: linear-gradient(135deg, var(--rosa-neon), var(--cian-neon));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 16px;
        }

        .modal-contenido p {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.1rem;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 20px;
        }

        .modal-contenido .cerrar-modal {
            padding: 10px 30px;
            border-radius: 40px;
            background: var(--rosa-neon);
            border: none;
            color: var(--negro-fondo);
            font-family: 'Rajdhani', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .modal-contenido .cerrar-modal:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 45, 117, 0.4);
        }

        /* ============================================================
           FOOTER
           ============================================================ */
        .footer-radical {
            width: 100%;
            text-align: center;
            padding: 20px 10px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            margin-top: 20px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.15);
            letter-spacing: 3px;
            font-size: 0.8rem;
        }

        .footer-radical .corazon-neon {
            color: var(--rosa-neon);
            display: inline-block;
            animation: latidoNeon 1.6s ease-in-out infinite;
            text-shadow: 0 0 20px rgba(255, 45, 117, 0.5);
        }

        @keyframes latidoNeon {
            0%,
            100% {
                transform: scale(1);
            }
            20% {
                transform: scale(1.3);
            }
            40% {
                transform: scale(1);
            }
            60% {
                transform: scale(1.2);
            }
            80% {
                transform: scale(1);
            }
        }

        /* ============================================================
           RESPONSIVE
           ============================================================ */
        @media (max-width: 700px) {
            .contador-grid-radical {
                grid-template-columns: repeat(3, 1fr);
                gap: 12px;
            }
            .tarjeta-tiempo-radical .numero {
                font-size: 2rem;
            }
            .seccion-contador-radical {
                padding: 30px 16px;
                border-radius: 40px;
            }
            .card-radical {
                padding: 30px 20px;
                min-height: 200px;
            }
            .header-radical .titulo-principal {
                letter-spacing: 2px;
            }
            .header-radical .subtitulo {
                letter-spacing: 4px;
                font-size: 1rem;
            }
            .seccion-timeline {
                padding: 30px 16px;
                border-radius: 40px;
            }
            .timeline-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 480px) {
            .contador-grid-radical {

function actualizarContador() {
    const ahora = new Date();

        "1 Samuel 18:1: Y aconteció que... el alma de Jonatán quedó ligada con la de David, y lo amó Jonatán como a sí mismo. (Refleja la lealtad profunda y apasionada entre amigos).",
        "Cantar de los Cantares 1:15: He aquí que tú eres hermosa, amiga mía; he aquí que eres bella; tus ojos son como de paloma.",

    function generarMensaje() {

    btnAbrir.addEventListener('click', () => {
        texto.textContent = generarMensaje();
        modal.classList.add('activo');
        document.body.style.overflow = 'hidden';
    });

    cerrar.addEventListener('click', () => {
        modal.classList.remove('activo');
        document.body.style.overflow = '';
    });

    modal.addEventListener('click', (e) => {
        if (e.target === modal) {
            modal.classList.remove('activo');

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && modal.classList.contains('activo')) {
            modal.classList.remove('activo');
            document.body.style.overflow = '';
        }
    });
})();

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />

    />
    <style>
        /* ===== RESET Y BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --morado-oscuro: #140a22;
            --morado-profundo: #1f0f33;
            --morado-medio: #3a1f5c;
            --morado: #6b3fa0;
            --morado-claro: #9b6fc0;
            --lavanda: #d4bff0;
            --lavanda-suave: #ede4f7;
            --dorado: #c9a84c;
            --dorado-claro: #e0cd8b;
            --blanco: #fdf7fc;
            --texto-claro: #d4c4e0;
            --texto-medio: #b098c0;
            --sombra: 0 8px 40px rgba(0, 0, 0, 0.6);
            --glass-bg: rgba(30, 15, 50, 0.55);
            --glass-border: rgba(255, 255, 255, 0.12);
            --degradado-fondo: radial-gradient(ellipse at 30% 10%, #2d1b4a 0%, #140a22 70%);
            --degradado-morado: linear-gradient(135deg, #6b3fa0, #9b6fc0, #d4bff0);
            --degradado-dorado: linear-gradient(135deg, #c9a84c, #e0cd8b);
            --transicion: 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--degradado-fondo);
            color: var(--texto-claro);
            min-height: 100vh;
            overflow: hidden;
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
        }

        /* ===== FONDO CON ONDAS Y PARTÍCULAS (visible) ===== */
        .fondo-ondas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .fondo-ondas svg {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.15;
        }

        .particulas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .particula {
            position: absolute;
            background: radial-gradient(circle, rgba(180, 140, 220, 0.3) 0%, transparent 70%);
            border-radius: 50%;
            animation: flotarParticula lineal infinite;
        }

        @keyframes flotarParticula {
            0% {
                transform: translateY(100vh) scale(0.2) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-10vh) scale(1.2) rotate(720deg);
                opacity: 0;
            }
        }

        /* ===== OVERLAY DE MANTENIMIENTO ===== */
        .mantenimiento-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(20, 10, 34, 0.82);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 20px;
            animation: aparecerOverlay 1s ease-out;
        }

        @keyframes aparecerOverlay {
            from {
                opacity: 0;
                transform: scale(0.96);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .mantenimiento-contenedor {

            padding: 40px 30px;

            border: 1px solid rgba(255, 255, 255, 0.08);

            box-shadow: 0 20px 80px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .mantenimiento-icono {
            font-size: 4rem;
            margin-bottom: 10px;
            display: inline-block;
            animation: girarIcono 8s linear infinite;
        }

        @keyframes girarIcono {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .mantenimiento-titulo {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.8rem, 7vw, 4.5rem);
            font-weight: 600;
            background: var(--degradado-morado);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .mantenimiento-sub {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(1.2rem, 2.5vw, 1.8rem);
            color: var(--lavanda);
            font-weight: 300;
            margin-bottom: 30px;
            opacity: 0.8;
        }

        .mantenimiento-frase {
            color: var(--texto-medio);
            font-size: 1rem;
            letter-spacing: 1px;
            margin-bottom: 30px;
            border-top: 1px solid rgba(255,255,255,0.06);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            padding: 12px 0;
            display: inline-block;
        }

        /* ===== CONTADOR REGRESIVO ===== */
        .contador-regresivo {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin: 20px 0 10px;
        }

        @media (max-width: 500px) {
            .contador-regresivo {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }
        }

        .tarjeta-tiempo {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 24px;
            padding: 18px 8px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: var(--transicion);
            backdrop-filter: blur(4px);
        }

        .tarjeta-tiempo:hover {
            transform: translateY(-4px);
            border-color: var(--morado-claro);
            background: rgba(255, 255, 255, 0.08);
        }

        .tarjeta-tiempo .numero {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.4rem, 5vw, 3.6rem);
            font-weight: 700;
            background: var(--degradado-dorado);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.2;
        }

        .tarjeta-tiempo .etiqueta {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--texto-medio);
            font-weight: 400;
            margin-top: 4px;
        }

        .mensaje-final {
            margin-top: 24px;
            font-size: 0.9rem;
            color: var(--texto-medio);
            letter-spacing: 0.5px;
        }

        .mensaje-final span {
            color: var(--dorado-claro);
            font-weight: 500;
        }

        .deco-linea {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            margin: 16px 0 8px;
            font-size: 1.2rem;
            color: var(--lavanda);
            opacity: 0.2;
        }

        .deco-linea .linea {
            width: 50px;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--lavanda), transparent);
        }

        /* ===== CONTENIDO ORIGINAL OCULTO ===== */
        .main-wrapper {
            display: none;
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar {
            width: 0;
        }

        /* ===== ANIMACIONES ===== */
        @keyframes brillo {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }
        .brillo-sutil {
            animation: brillo 4s ease-in-out infinite;
        }
    </style>
</head>
